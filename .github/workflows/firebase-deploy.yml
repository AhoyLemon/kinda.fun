name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          # Match previous CI behavior by skipping lifecycle scripts during install.
          bun install --ignore-scripts
          echo "✅ Main dependencies installed"
          echo "📦 Installing functions dependencies separately..."
          cd functions && bun install --ignore-scripts || echo "⚠️ Functions install failed (this might be expected)"
          cd ..
          echo "📋 Verifying key dependencies..."
          bun pm ls vite vue @vitejs/plugin-vue

      - name: Build project
        run: |
          echo "🏗️ Starting build process..."
          echo "Current working directory: $(pwd)"
          echo "Node.js version: $(node --version)"
          echo "Bun version: $(bun --version)"
          echo "🏗️ Running full build script..."
          bun run build -- --mode production
        env:
          NODE_ENV: production
          ENVIRONMENT: production
          IS_DEV: "false"
          IS_PROD: "true"
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Verify dist directory exists
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory was not created during build"
            echo "Listing current directory contents:"
            ls -la
            exit 1
          fi
          echo "✅ dist directory exists"
          echo "Contents of dist directory:"
          ls -la dist/

      - name: Deploy to Firebase
        run: |
          SERVICE_ACCOUNT_PATH="$RUNNER_TEMP/firebase-service-account.json"
          trap 'rm -f "$SERVICE_ACCOUNT_PATH"' EXIT
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KINDA_FUN }}' > "$SERVICE_ACCOUNT_PATH"
          chmod 600 "$SERVICE_ACCOUNT_PATH"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_PATH"
          bunx firebase-tools@latest deploy --only hosting --project kinda-fun --non-interactive
        env:
          NODE_NO_WARNINGS: "1"
