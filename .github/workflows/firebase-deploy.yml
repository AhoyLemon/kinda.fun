name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kinda.fun

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          # Skip lifecycle scripts in CI installs.
          bun install --ignore-scripts
          echo "✅ Main dependencies installed"
          echo "📦 Installing functions dependencies separately..."
          cd functions && bun install --ignore-scripts || echo "⚠️ Functions install failed (this might be expected)"
          cd ..
          echo "📋 Verifying key dependencies..."
          bun pm ls nuxt vue

      - name: Verify routes (prerender, hydration, redirects)
        run: |
          echo "🔎 Running the route verify harness…"
          bun run verify --no-emulator

      - name: Build project
        run: |
          echo "🏗️ Starting build process..."
          echo "Current working directory: $(pwd)"
          echo "Node.js version: $(node --version)"
          echo "Bun version: $(bun --version)"
          echo "🏗️ Running full build script..."
          bun run build
        env:
          NODE_ENV: production
          ENVIRONMENT: production
          IS_DEV: "false"
          IS_PROD: "true"
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Verify build output exists
        run: |
          if [ ! -d ".output/public" ]; then
            echo "❌ Error: .output/public was not created during build"
            echo "Listing current directory contents:"
            ls -la
            exit 1
          fi
          echo "✅ .output/public exists"
          echo "Contents of .output/public:"
          ls -la .output/public/

      - name: Deploy to Firebase
        run: |
          SERVICE_ACCOUNT_PATH="$RUNNER_TEMP/firebase-service-account.json"
          trap 'rm -f "$SERVICE_ACCOUNT_PATH"' EXIT
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KINDA_FUN }}' > "$SERVICE_ACCOUNT_PATH"
          chmod 600 "$SERVICE_ACCOUNT_PATH"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_PATH"
          bunx firebase-tools@latest deploy --only hosting --project kinda-fun --non-interactive
        env:
          NODE_NO_WARNINGS: "1"
