name: Monthly Dependency Update

on:
  schedule:
    # Runs at 3:47 AM UTC on the 7th of each month
    - cron: "47 3 7 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set month label
        id: month
        run: echo "value=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Update dependencies
        run: bun update

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Check if bun.lock changed
        id: lockfile
        run: |
          if git diff --quiet bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ bun.lock unchanged — no dependency updates. Skipping PR creation."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect changed packages
        if: steps.lockfile.outputs.changed == 'true'
        id: changed_packages
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          previous = json.loads(subprocess.check_output(['git', 'show', 'HEAD:package.json'], text=True))
          with open('package.json', 'r', encoding='utf-8') as handle:
              current = json.load(handle)

          rows = []
          for section in ('dependencies', 'devDependencies'):
              before = previous.get(section, {})
              after = current.get(section, {})
              for name in sorted(set(before) | set(after)):
                  old = before.get(name, '—')
                  new = after.get(name, '—')
                  if old != new:
                      rows.append((name, old, new))

          MAX = 40
          out = []
          if rows:
              out.append('| Package | Before | After |')
              out.append('|---------|--------|-------|')
              for name, old, new in rows[:MAX]:
                  out.append(f'| `{name}` | `{old}` | `{new}` |')
              if len(rows) > MAX:
                  out.append(f'')
                  out.append(f'*(…and {len(rows) - MAX} more — see the full diff)*')
              out.append('')
              out.append(f'**{len(rows)} package(s) updated**')
          else:
              out.append('*(no version changes detected in bun.lock diff)*')

          table = '\n'.join(out)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('table<<EOF\n')
              f.write(table + '\n')
              f.write('EOF\n')
          PYEOF

      - name: Build project
        if: steps.lockfile.outputs.changed == 'true'
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          bun run build -- --mode production 2>&1 | tee /tmp/build.log
        env:
          NODE_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Run unit tests
        if: steps.lockfile.outputs.changed == 'true'
        id: unit_tests
        continue-on-error: true
        run: |
          set -o pipefail
          bun run test:run 2>&1 | tee /tmp/unit-tests.log

      - name: Install Playwright Chromium
        if: steps.lockfile.outputs.changed == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        if: steps.lockfile.outputs.changed == 'true'
        id: smoke_tests
        continue-on-error: true
        run: |
          set -o pipefail
          bunx playwright test 2>&1 | tee /tmp/smoke-tests.log
        env:
          CI: "true"

      - name: Collect failure details
        if: steps.lockfile.outputs.changed == 'true'
        id: failures
        run: |
          {
            echo "build_section<<FAILSECTIONEOF"
            if [ "${{ steps.build.outcome }}" != "success" ] && [ -f /tmp/build.log ]; then
              echo "#### 🏗️ Build errors"
              echo '```'
              grep -iE '\berror\b' /tmp/build.log | grep -vE '^\s*$' | head -20 || true
              echo '```'
            fi
            echo "FAILSECTIONEOF"

            echo "unit_section<<FAILSECTIONEOF"
            if [ "${{ steps.unit_tests.outcome }}" != "success" ] && [ -f /tmp/unit-tests.log ]; then
              echo "#### 🧪 Failing unit tests"
              echo '```'
              grep -E '(^ FAIL |✗|×| FAILED )' /tmp/unit-tests.log \
                | grep -vE '^\s*$' | head -20 || true
              echo '```'
            fi
            echo "FAILSECTIONEOF"

            echo "smoke_section<<FAILSECTIONEOF"
            if [ "${{ steps.smoke_tests.outcome }}" != "success" ] && [ -f /tmp/smoke-tests.log ]; then
              echo "#### 🌐 Failing smoke tests"
              echo '```'
              grep -E '^\s+[0-9]+\)' /tmp/smoke-tests.log \
                | grep -vE '^\s*$' | head -20 || true
              echo '```'
            fi
            echo "FAILSECTIONEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine PR draft status
        if: steps.lockfile.outputs.changed == 'true'
        id: pr_meta
        run: |
          BUILD="${{ steps.build.outcome }}"
          UNIT="${{ steps.unit_tests.outcome }}"
          SMOKE="${{ steps.smoke_tests.outcome }}"
          if [ "$BUILD" = "success" ] && [ "$UNIT" = "success" ] && [ "$SMOKE" = "success" ]; then
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest Bun version
        if: steps.lockfile.outputs.changed == 'true'
        id: bun_latest
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/oven-sh/bun/releases/latest \
            | grep '"tag_name"' \
            | sed 's/.*"tag_name": "bun-v\([^"]*\)".*/\1/' || echo "unknown")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Render PR body and failure comment
        if: steps.lockfile.outputs.changed == 'true'
        id: pr_content
        env:
          MONTH: ${{ steps.month.outputs.value }}
          DRAFT: ${{ steps.pr_meta.outputs.draft }}
          CHANGED_PACKAGES: ${{ steps.changed_packages.outputs.table }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          UNIT_OUTCOME: ${{ steps.unit_tests.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke_tests.outcome }}
          BUILD_SECTION: ${{ steps.failures.outputs.build_section }}
          UNIT_SECTION: ${{ steps.failures.outputs.unit_section }}
          SMOKE_SECTION: ${{ steps.failures.outputs.smoke_section }}
          BUN_LATEST: ${{ steps.bun_latest.outputs.latest }}
        run: |
          python3 - <<'PYEOF'
          import os
          from pathlib import Path

          month = os.environ['MONTH']
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          draft = os.environ['DRAFT'] == 'true'

          def result(outcome):
              return '✅ passed' if outcome == 'success' else '❌ failed'

          sections = [
              os.environ['BUILD_SECTION'].strip(),
              os.environ['UNIT_SECTION'].strip(),
              os.environ['SMOKE_SECTION'].strip(),
          ]
          failure_sections = '\n\n'.join(section for section in sections if section)

          body_lines = [
              f"## Monthly dependency update — {month}",
              "",
              "### Updated packages",
              "",
              os.environ['CHANGED_PACKAGES'].strip(),
              "",
              "---",
              "",
              "### Validation",
              "",
              "| Check | Result |",
              "|-------|--------|",
              f"| 🏗️ Build | {result(os.environ['BUILD_OUTCOME'])} |",
              f"| 🧪 Unit tests | {result(os.environ['UNIT_OUTCOME'])} |",
              f"| 🌐 Smoke tests | {result(os.environ['SMOKE_OUTCOME'])} |",
          ]

          if draft:
              body_lines.extend([
                  "",
                  f"> ⚠️ **This PR is a draft because one or more checks failed.** See the failure details below and the [full workflow run]({run_url}) for complete logs.",
              ])
              if failure_sections:
                  body_lines.extend(["", failure_sections])

          body_lines.extend([
              "",
              "---",
              "",
              "### Bun version note",
              f"Pinned: `1.3.14` — Latest: `{os.environ['BUN_LATEST']}`",
              "*(Bun is intentionally not auto-updated — bump manually when ready)*",
          ])

          body = '\n'.join(body_lines).strip() + '\n'
          Path('/tmp/monthly-deps-pr-body.md').write_text(body, encoding='utf-8')

          comment = ''
          if draft:
              comment_lines = [
                  "<!-- monthly-deps-failure-summary -->",
                  f"## Monthly dependency update validation failed — {month}",
                  "",
                  f"[View the full workflow run]({run_url})",
                  "",
                  "### Validation",
                  "",
                  "| Check | Result |",
                  "|-------|--------|",
                  f"| 🏗️ Build | {result(os.environ['BUILD_OUTCOME'])} |",
                  f"| 🧪 Unit tests | {result(os.environ['UNIT_OUTCOME'])} |",
                  f"| 🌐 Smoke tests | {result(os.environ['SMOKE_OUTCOME'])} |",
              ]
              if failure_sections:
                  comment_lines.extend(["", failure_sections])
              comment = '\n'.join(comment_lines).strip() + '\n'

          Path('/tmp/monthly-deps-failure-comment.md').write_text(comment, encoding='utf-8')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write('body_path=/tmp/monthly-deps-pr-body.md\n')
              handle.write('comment_path=/tmp/monthly-deps-failure-comment.md\n')
          PYEOF

      - name: Sync dependency branch via GitHub API
        if: steps.lockfile.outputs.changed == 'true'
        id: branch_sync
        env:
          GH_TOKEN: ${{ github.token }}
          MONTH: ${{ steps.month.outputs.value }}
          BRANCH_NAME: chore/monthly-deps-${{ steps.month.outputs.value }}
        run: |
          python3 - <<'PYEOF'
          import base64
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ['GH_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          branch = os.environ['BRANCH_NAME']
          base_branch = os.environ['GITHUB_REF_NAME']
          commit_message = f"chore(deps): monthly bun update — {os.environ['MONTH']}"

          def api(method, path, payload=None):
              request = urllib.request.Request(
                  f"https://api.github.com/{path}",
                  data=None if payload is None else json.dumps(payload).encode('utf-8'),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'Content-Type': 'application/json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
                  method=method,
              )
              with urllib.request.urlopen(request) as response:
                  if response.length == 0:
                      return None
                  return json.load(response)

          def create_blob(path):
              with open(path, 'rb') as handle:
                  encoded = base64.b64encode(handle.read()).decode('ascii')
              blob = api('POST', f'repos/{repo}/git/blobs', {
                  'content': encoded,
                  'encoding': 'base64',
              })
              return blob['sha']

          base_ref = api('GET', f'repos/{repo}/git/ref/heads/{base_branch}')
          base_sha = base_ref['object']['sha']
          base_commit = api('GET', f'repos/{repo}/git/commits/{base_sha}')
          base_tree = base_commit['tree']['sha']

          tree = api('POST', f'repos/{repo}/git/trees', {
              'base_tree': base_tree,
              'tree': [
                  {
                      'path': 'package.json',
                      'mode': '100644',
                      'type': 'blob',
                      'sha': create_blob('package.json'),
                  },
                  {
                      'path': 'bun.lock',
                      'mode': '100644',
                      'type': 'blob',
                      'sha': create_blob('bun.lock'),
                  },
              ],
          })

          commit = api('POST', f'repos/{repo}/git/commits', {
              'message': commit_message,
              'tree': tree['sha'],
              'parents': [base_sha],
          })

          try:
              api('GET', f'repos/{repo}/git/ref/heads/{branch}')
              branch_exists = True
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              branch_exists = False

          if branch_exists:
              api('PATCH', f'repos/{repo}/git/refs/heads/{branch}', {
                  'sha': commit['sha'],
                  'force': True,
              })
          else:
              api('POST', f'repos/{repo}/git/refs', {
                  'ref': f'refs/heads/{branch}',
                  'sha': commit['sha'],
              })

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'branch={branch}\n')
              handle.write(f'commit_sha={commit["sha"]}\n')
          PYEOF

      - name: Create or update dependency PR
        if: steps.lockfile.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.branch_sync.outputs.branch }}
          BODY_PATH: ${{ steps.pr_content.outputs.body_path }}
          TARGET_DRAFT: ${{ steps.pr_meta.outputs.draft }}
        run: |
          set -euo pipefail

          BASE_BRANCH="${GITHUB_REF_NAME}"
          TITLE="chore(deps): monthly bun update — ${{ steps.month.outputs.value }}"
          PR_NUMBER="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" --base "$BASE_BRANCH" --state open --json number --jq '.[0].number // ""')"

          if [ -z "$PR_NUMBER" ]; then
            if [ "$TARGET_DRAFT" = "true" ]; then
              gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base "$BASE_BRANCH" \
                --head "$BRANCH_NAME" \
                --title "$TITLE" \
                --body-file "$BODY_PATH" \
                --draft
            else
              gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base "$BASE_BRANCH" \
                --head "$BRANCH_NAME" \
                --title "$TITLE" \
                --body-file "$BODY_PATH"
            fi
            PR_NUMBER="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" --base "$BASE_BRANCH" --state open --json number --jq '.[0].number // ""')"
          else
            gh pr edit "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body-file "$BODY_PATH"
          fi

          CURRENT_DRAFT="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')"
          if [ "$TARGET_DRAFT" = "true" ] && [ "$CURRENT_DRAFT" != "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --undo
          elif [ "$TARGET_DRAFT" != "true" ] && [ "$CURRENT_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
          fi

          PR_URL="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json url --jq '.url')"

          {
            echo "number=$PR_NUMBER"
            echo "url=$PR_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert failure summary comment
        if: steps.lockfile.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          COMMENT_PATH: ${{ steps.pr_content.outputs.comment_path }}
          TARGET_DRAFT: ${{ steps.pr_meta.outputs.draft }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ['GH_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          pr_number = os.environ['PR_NUMBER']
          target_draft = os.environ['TARGET_DRAFT'] == 'true'
          marker = '<!-- monthly-deps-failure-summary -->'

          def api(method, path, payload=None):
              request = urllib.request.Request(
                  f"https://api.github.com/{path}",
                  data=None if payload is None else json.dumps(payload).encode('utf-8'),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'Content-Type': 'application/json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
                  method=method,
              )
              with urllib.request.urlopen(request) as response:
                  if response.length == 0:
                      return None
                  return json.load(response)

          comments = api('GET', f'repos/{repo}/issues/{pr_number}/comments?per_page=100') or []
          existing = next((comment for comment in comments if marker in comment.get('body', '')), None)

          if target_draft:
              with open(os.environ['COMMENT_PATH'], 'r', encoding='utf-8') as handle:
                  body = handle.read().strip()
              if not body:
                  raise SystemExit('Failure summary comment body is empty for a draft PR.')
              payload = {'body': body}
              if existing:
                  api('PATCH', f'repos/{repo}/issues/comments/{existing["id"]}', payload)
              else:
                  api('POST', f'repos/{repo}/issues/{pr_number}/comments', payload)
          elif existing:
              request = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/issues/comments/{existing["id"]}',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
                  method='DELETE',
              )
              with urllib.request.urlopen(request):
                  pass
          PYEOF
