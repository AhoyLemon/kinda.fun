name: Monthly Dependency Update

on:
  schedule:
    # Runs at 3:47 AM UTC on the 7th of each month
    - cron: "47 3 7 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set month label
        id: month
        run: echo "value=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Update dependencies
        run: bun update

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Check if bun.lock changed
        id: lockfile
        run: |
          if git diff --quiet bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ bun.lock unchanged — no dependency updates. Skipping PR creation."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect changed packages
        if: steps.lockfile.outputs.changed == 'true'
        id: changed_packages
        run: |
          python3 - <<'PYEOF'
          import subprocess, re, os

          diff = subprocess.check_output(['git', 'diff', 'bun.lock'], text=True)
          removed, added = {}, {}

          for line in diff.split('\n'):
              is_rm  = line.startswith('-') and not line.startswith('---')
              is_add = line.startswith('+') and not line.startswith('+++')
              if not (is_rm or is_add):
                  continue
              for entry in re.findall(r'"([^@"]+@[^"]+)"', line):
                  at = entry.rfind('@')
                  if at <= 0:
                      continue
                  name, ver = entry[:at], entry[at + 1:]
                  if is_rm:
                      removed.setdefault(name, ver)
                  else:
                      added.setdefault(name, ver)

          rows = []
          for name in sorted(set(list(removed) + list(added))):
              old = removed.get(name, '—')
              new = added.get(name, '—')
              if old != new:
                  rows.append((name, old, new))

          MAX = 40
          out = []
          if rows:
              out.append('| Package | Before | After |')
              out.append('|---------|--------|-------|')
              for name, old, new in rows[:MAX]:
                  out.append(f'| `{name}` | `{old}` | `{new}` |')
              if len(rows) > MAX:
                  out.append(f'')
                  out.append(f'*(…and {len(rows) - MAX} more — see the full diff)*')
              out.append('')
              out.append(f'**{len(rows)} package(s) updated**')
          else:
              out.append('*(no version changes detected in bun.lock diff)*')

          table = '\n'.join(out)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('table<<EOF\n')
              f.write(table + '\n')
              f.write('EOF\n')
          PYEOF

      - name: Build project
        if: steps.lockfile.outputs.changed == 'true'
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          bun run build -- --mode production 2>&1 | tee /tmp/build.log
        env:
          NODE_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Run unit tests
        if: steps.lockfile.outputs.changed == 'true'
        id: unit_tests
        continue-on-error: true
        run: |
          set -o pipefail
          bun run test:run 2>&1 | tee /tmp/unit-tests.log

      - name: Install Playwright Chromium
        if: steps.lockfile.outputs.changed == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        if: steps.lockfile.outputs.changed == 'true'
        id: smoke_tests
        continue-on-error: true
        run: |
          set -o pipefail
          bunx playwright test 2>&1 | tee /tmp/smoke-tests.log
        env:
          CI: "true"

      - name: Collect failure details
        if: steps.lockfile.outputs.changed == 'true'
        id: failures
        run: |
          {
            echo "build_section<<FAILSECTIONEOF"
            if [ "${{ steps.build.outcome }}" != "success" ] && [ -f /tmp/build.log ]; then
              echo "#### 🏗️ Build errors"
              echo '```'
              grep -iE '\berror\b' /tmp/build.log | grep -vE '^\s*$' | head -20 || true
              echo '```'
            fi
            echo "FAILSECTIONEOF"

            echo "unit_section<<FAILSECTIONEOF"
            if [ "${{ steps.unit_tests.outcome }}" != "success" ] && [ -f /tmp/unit-tests.log ]; then
              echo "#### 🧪 Failing unit tests"
              echo '```'
              grep -E '(^ FAIL |✗|×| FAILED )' /tmp/unit-tests.log \
                | grep -vE '^\s*$' | head -20 || true
              echo '```'
            fi
            echo "FAILSECTIONEOF"

            echo "smoke_section<<FAILSECTIONEOF"
            if [ "${{ steps.smoke_tests.outcome }}" != "success" ] && [ -f /tmp/smoke-tests.log ]; then
              echo "#### 🌐 Failing smoke tests"
              echo '```'
              grep -E '^\s+[0-9]+\)' /tmp/smoke-tests.log \
                | grep -vE '^\s*$' | head -20 || true
              echo '```'
            fi
            echo "FAILSECTIONEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine PR draft status
        if: steps.lockfile.outputs.changed == 'true'
        id: pr_meta
        run: |
          BUILD="${{ steps.build.outcome }}"
          UNIT="${{ steps.unit_tests.outcome }}"
          SMOKE="${{ steps.smoke_tests.outcome }}"
          if [ "$BUILD" = "success" ] && [ "$UNIT" = "success" ] && [ "$SMOKE" = "success" ]; then
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest Bun version
        if: steps.lockfile.outputs.changed == 'true'
        id: bun_latest
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/oven-sh/bun/releases/latest \
            | grep '"tag_name"' \
            | sed 's/.*"tag_name": "bun-v\([^"]*\)".*/\1/' || echo "unknown")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.lockfile.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): monthly bun update — ${{ steps.month.outputs.value }}"
          branch: chore/monthly-deps-${{ steps.month.outputs.value }}
          delete-branch: true
          draft: ${{ steps.pr_meta.outputs.draft }}
          title: "chore(deps): monthly bun update — ${{ steps.month.outputs.value }}"
          body: |
            ## Monthly dependency update — ${{ steps.month.outputs.value }}

            ### Updated packages

            ${{ steps.changed_packages.outputs.table }}

            ---

            ### Validation

            | Check | Result |
            |-------|--------|
            | 🏗️ Build | ${{ steps.build.outcome == 'success' && '✅ passed' || '❌ failed' }} |
            | 🧪 Unit tests | ${{ steps.unit_tests.outcome == 'success' && '✅ passed' || '❌ failed' }} |
            | 🌐 Smoke tests | ${{ steps.smoke_tests.outcome == 'success' && '✅ passed' || '❌ failed' }} |

            ${{ steps.pr_meta.outputs.draft == 'true' && format('> ⚠️ **This PR is a draft because one or more checks failed.** See the failure details below and the [full workflow run]({0}/{1}/actions/runs/{2}) for complete logs.', github.server_url, github.repository, github.run_id) || '' }}

            ${{ steps.failures.outputs.build_section }}

            ${{ steps.failures.outputs.unit_section }}

            ${{ steps.failures.outputs.smoke_section }}

            ---

            ### Bun version note
            Pinned: `1.3.14` — Latest: `${{ steps.bun_latest.outputs.latest }}`
            *(Bun is intentionally not auto-updated — bump manually when ready)*
