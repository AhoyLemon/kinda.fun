    <div id="app" v-cloak="v-cloak">
      <div class="title-screen">
        <div class="choice-holder">
          <div class="inner">
            <div class="above-choices"> 
              <h1>Choose a game.</h1>
            </div>
            <div class="game-choices">
              <div class="game" :class="{ active: (gameChoice == 'guillotine'), inactive: (gameChoice &amp;&amp; gameChoice != 'guillotine') }">
                <figure class="logo" @click="gameChoice = 'guillotine'"><img src="svg/no_more_billionaires.svg" alt="No More Billionaires! logo"/></figure>
                <figcaption>
                  <div class="slogan">Generating Wealth with a Guillotine</div>
                  <div class="players-allowed">For 1 player.<br/>(with a new set of choices every day)</div>
                </figcaption>
                <script type="application/ld+json">
                  {
                    "@context": "http://schema.org",
                    "@type": "VideoGame",
                    "name": "NO MORE BILLIONAIRES",
                    "url": "https://kinda.fun/guillotine",
                    "image": "https://kinda.fun/img/og-guillotine.jpg",
                    "playMode": "SinglePlayer",
                    "applicationCategory": "browser game",
                    "gamePlatform": "web browser",
                    "operatingSystem": "web browser",
                    "genre": "comedy",
                    "description": "The game where you generate wealth through the use of a guillotine."
                  }
                  
                </script>
              </div>
              <div class="game" :class="{ active: (gameChoice == 'cameo'), inactive: (gameChoice &amp;&amp; gameChoice != 'cameo') }">
                <figure class="logo" @click="gameChoice = 'cameo'"><img src="svg/comparatively-famous.svg" alt="Comparatively Famous logo"/></figure>
                <figcaption>
                  <div class="slogan">The Game of Celebrity Value</div>
                  <div class="players-allowed">For 1 player.<br/>(but can be replayed with friends)</div>
                </figcaption>
                <script type="application/ld+json">
                  {
                    "@context": "http://schema.org",
                    "@type": "VideoGame",
                    "name": "Comparatively Famous",
                    "url": "https://kinda.fun/cameo",
                    "image": "https://kinda.fun/img/og-famous.png",
                    "playMode": "SinglePlayer",
                    "applicationCategory": "browser game",
                    "gamePlatform": "web browser",
                    "operatingSystem": "web browser",
                    "genre": "comedy",
                    "description": "The Game of Celebrity Value"
                  }
                  
                </script>
              </div>
              <div class="game" :class="{ active: (gameChoice == 'sisyphus'), inactive: (gameChoice &amp;&amp; gameChoice != 'sisyphus') }">
                <figure class="logo" @click="gameChoice = 'sisyphus'"><img src="svg/sisyphus/logo-simple.svg" alt="Sisyphus Clicker logo"/></figure>
                <figcaption>
                  <div class="slogan">Push the rock uphill. Earn cheevos.</div>
                  <div class="players-allowed">For 1 player<br/>(1 very lonely player)</div>
                </figcaption>
                <script type="application/ld+json">
                  {
                    "@context": "http://schema.org",
                    "@type": "VideoGame",
                    "name": "Sisyphus Clicker",
                    "url": "https://kinda.fun/sisyphus",
                    "image": "https://kinda.fun/img/sisyphus/og-wide.png",
                    "playMode": "SinglePlayer",
                    "applicationCategory": "browser game",
                    "gamePlatform": "web browser",
                    "operatingSystem": "web browser",
                    "genre": "comedy",
                    "description": "Click on Sisyphus to push the rock up the mountain (formerly futile.fun)"
                  }
                  
                </script>
              </div>
              <div class="game" :class="{ active: (gameChoice == 'invalid'), inactive: (gameChoice &amp;&amp; gameChoice != 'invalid') }">
                <figure class="logo" @click="gameChoice = 'invalid'"><img src="svg/invalid-logo.svg" alt="Invalid logo"/></figure>
                <figcaption>
                  <div class="slogan">A trivia game of unnecessary suffering.</div>
                  <div class="players-allowed">For 2 or more players.<br/>(but best with 4 - 8)</div>
                </figcaption>
                <script type="application/ld+json">
                  {
                    "@context": "http://schema.org",
                    "@type": "VideoGame",
                    "name": "Invalid",
                    "url": "https://kinda.fun/invalid",
                    "image": "https://kinda.fun/img/og-invalid.png",
                    "playMode": "MultiPlayer",
                    "applicationCategory": "browser game",
                    "gamePlatform": "web browser",
                    "operatingSystem": "web browser",
                    "genre": "comedy",
                    "description": "A trivia game of unnecessary suffering."
                  }
                  
                </script>
              </div>
              <div class="game" :class="{ active: (gameChoice == 'wrongest'), inactive: (gameChoice &amp;&amp; gameChoice != 'wrongest') }">
                <figure class="logo" @click="gameChoice = 'wrongest'"><img src="svg/wrongest.svg" alt="The Wrongest Words logo"/></figure>
                <figcaption>
                  <div class="slogan">You're going to defend some very stupid ideas.</div>
                  <div class="players-allowed">For 3 or more players.<br/>(but best with 5 - 10)</div>
                </figcaption>
                <script type="application/ld+json">
                  {
                    "@context": "http://schema.org",
                    "@type": "VideoGame",
                    "name": "The Wrongest Words",
                    "url": "https://kinda.fun/wrongest",
                    "image": "https://kinda.fun/img/og-wrongest.png",
                    "playMode": "MultiPlayer",
                    "applicationCategory": "browser game",
                    "gamePlatform": "web browser",
                    "operatingSystem": "web browser",
                    "genre": "comedy",
                    "description": "You're going to defend some very stupid ideas."  
                  }
                  
                </script>
              </div>
            </div>
          </div>
        </div>
        <div class="create-or-join" v-if="gameChoice">
          <div class="start-playing" v-if="gameChoice == 'cameo' || gameChoice == 'sisyphus' ||  gameChoice == 'guillotine'">
            <button @click="startSinglePlayerGame()">Start Playing</button>
          </div>
          <div class="options" v-else="v-else">
            <div class="create">
              <button @click="createRoom()">Create a New Room</button>
            </div>
            <div class="or"><span>or</span></div>
            <div class="join">
              <button @click="joinRoom()">Join a Room</button>
            </div>
          </div>
        </div>
      </div>
